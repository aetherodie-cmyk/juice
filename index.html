  async function gdLoadBoard(fileId,fileName){
    const text=await gdReadFile(fileId);if(!text)return;
    try{const d=JSON.parse(text);state=normalize(d);state.savedAt=d.savedAt||now();}catch(e){state=normalize({});}
    gdCurrentFileId=fileId;gdCurrentFileName=fileName;
    gdInboxFileId=await gdFindInboxFile(fileName);
    if(!gdInboxFileId)gdInboxFileId=await gdCreateInboxFile(fileName);
    inboxCards=[];updateInboxBadge();
    await gdReadInbox();
    closePanel();selection.clear();selectedLink=null;selectedImage=null;selectedGroup=null;
    buildScene();persistLocalOnly();updateDriveBtn();updateInboxLink();
    showBanner('已載入白板「'+fileName.replace(/\.json$/,'')+'」');}

  function updateDriveBtn(){const lbl=$('driveBtnLbl'),av=$('driveAvatar'),img=$('driveAvatarImg'),ci=$('driveCloudIcon'),bn=$('boardName');
    if(gdReady()&&gdUser){const name=gdCurrentFileName?gdCurrentFileName.replace(/\.json$/,''):'';
      lbl.textContent=name||'Drive';if(bn)bn.textContent=name?'· '+name:'';
      document.title=name?name+' · 聚思':'聚思';
      if(gdUser.picture){av.style.display='block';img.src=gdUser.picture;if(ci)ci.style.display='none';}
      else{av.style.display='none';if(ci)ci.style.display='';}
    }else{lbl.textContent='Drive';av.style.display='none';if(ci)ci.style.display='';if(bn)bn.textContent='';document.title='聚思';}}

  async function renderDriveModal(){
    const login=$('drvLogin'),loggedIn=$('drvLoggedIn');
    if(!gdReady()){login.style.display='';loggedIn.style.display='none';return;}
    login.style.display='none';loggedIn.style.display='';
    // 用戶列
    const ur=$('drvUserRow');ur.innerHTML=gdUser?`${gdUser.picture?`<img src="${gdUser.picture}" alt="">`:''}
      <div><div class="drv-username">${gdUser.name||''}</div><div class="drv-useremail">${gdUser.email||''}</div></div>`:'';
    // 白板列表
    const bl=$('drvBoardList');bl.innerHTML='<div class="drv-loading">載入中…</div>';
    const boards=await gdListBoards();
    bl.innerHTML='';
    if(!boards.length){bl.innerHTML='<div style="color:var(--ink-soft);font-size:13px;padding:8px 0;">尚無白板，請按下方「新增白板」建立第一個。</div>';}
    boards.forEach(b=>{const div=document.createElement('div');div.className='drv-board'+(gdCurrentFileId===b.id?' active':'');
      const d=new Date(b.modifiedTime);const meta=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')} 修改`;
      div.innerHTML=`<span class="drv-board-icon">📋</span><div><div class="drv-board-name">${b.name.replace(/\.json$/,'')}</div><div class="drv-board-meta">${meta}</div></div><button class="drv-board-del" title="刪除">🗑</button>`;
      div.addEventListener('click',async e=>{if(e.target.closest('.drv-board-del')){if(!confirm('確定刪除白板「'+b.name.replace(/\.json$/,'')+'」？此操作無法復原。'))return;await gdDeleteBoard(b.id,b.name);if(gdCurrentFileId===b.id){gdCurrentFileId=null;gdCurrentFileName=null;gdInboxFileId=null;}renderDriveModal();return;}
        await gdLoadBoard(b.id,b.name);closeDriveModal();});
      bl.appendChild(div);});}

  function openDriveModal(){$('driveModal').classList.add('open');renderDriveModal();}
  function closeDriveModal(){$('driveModal').classList.remove('open');}
  $('drvClose').addEventListener('click',closeDriveModal);
  $('driveModal').addEventListener('pointerdown',e=>{if(e.target.id==='driveModal')closeDriveModal();});
  $('drvLoginBtn').addEventListener('click',gdLogin);
  $('drvLogout').addEventListener('click',gdLogout);
  $('btnDrive').addEventListener('click',()=>{if(gdReady())openDriveModal();else gdLogin();});
  $('drvNewBoard').addEventListener('click',async()=>{
    const name=prompt('白板名稱：','新白板');if(!name||!name.trim())return;
    const f=await gdCreateBoard(name.trim());if(!f){showBanner('建立失敗，請再試一次。');return;}
    await gdLoadBoard(f.id,name.trim()+'.json');
    closeDriveModal();});

  // 存檔時若有 Drive 連線就同步寫回
  const _origSave=save;
  // patch scheduleSave 讓 Drive 也跟著寫
  const _origScheduleSave=scheduleSave;

  // ── Drive 儲存狀態 ──
  let gdLastSavedAt=null, saveStatusTimer=null;
  function fmtAgo(ts){if(!ts)return '';const s=Math.floor((Date.now()-ts)/1000);
    if(s<10)return '剛剛儲存';if(s<60)return s+'秒前儲存';
    const m=Math.floor(s/60);if(m<60)return m+'分鐘前儲存';
    const h=Math.floor(m/60);return h+'小時前儲存';}
  function updateSaveStatus(){const el=$('saveStatus');if(!el)return;
    if(!gdReady()||!gdCurrentFileId){el.style.display='none';$('btnSaveNow').style.display='none';return;}
    el.style.display='';$('btnSaveNow').style.display='';
    el.textContent=fmtAgo(gdLastSavedAt);}
  function tickSaveStatus(){updateSaveStatus();saveStatusTimer=setTimeout(tickSaveStatus,30000);}

  // patch gdWriteFile 記錄最後存檔時間
  const _origGdWrite=gdWriteFile;
  gdWriteFile=async function(){
    $('btnSaveNow').classList.add('saving');
    await _origGdWrite();
    gdLastSavedAt=Date.now();
    $('btnSaveNow').classList.remove('saving');
    updateSaveStatus();};

  $('btnSaveNow').addEventListener('click',async()=>{
    if(!gdReady()||!gdCurrentFileId){showBanner('請先登入 Drive 並選取白板。');return;}
    await gdWriteFile();showBanner('已儲存到 Drive ✓');});

  // 每 30 秒更新「幾分鐘前」文字
  tickSaveStatus();

  // ============ CROSS-DEVICE SYNC (linked JSON file via File System Access API) ============
  const FSA=!!(window.showOpenFilePicker&&window.showSaveFilePicker);
  function idbReq(mode,fn){return new Promise(res=>{const r=indexedDB.open('sju-sync',1);
    r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains('kv'))r.result.createObjectStore('kv');};
    r.onsuccess=()=>{const tx=r.result.transaction('kv',mode);const st=tx.objectStore('kv');fn(st,res);};r.onerror=()=>res(null);});}
  function idbGet(k){return idbReq('readonly',(st,res)=>{const g=st.get(k);g.onsuccess=()=>res(g.result);g.onerror=()=>res(null);});}
  function idbSet(k,v){return idbReq('readwrite',(st,res)=>{st.put(v,k);st.transaction.oncomplete=()=>res(true);});}
  function idbDel(k){return idbReq('readwrite',(st,res)=>{st.delete(k);st.transaction.oncomplete=()=>res(true);});}
  async function ensurePerm(h){if(!h)return false;const o={mode:'readwrite'};try{if((await h.queryPermission(o))==='granted')return true;if((await h.requestPermission(o))==='granted')return true;}catch(e){}return false;}
  function updateSyncBtn(stt){const d=$('syncDot');if(!d)return;d.style.background=stt==='ok'?'#5BB97E':stt==='need'?'#E0A82E':stt==='error'?'#D2453E':'#C2C8D2';}
  let fileWriteTimer=null;const scheduleFileWrite=()=>{clearTimeout(fileWriteTimer);fileWriteTimer=setTimeout(writeSyncFile,800);};
  async function writeSyncFile(){if(!syncHandle||!syncReady)return;try{const w=await syncHandle.createWritable();await w.write(JSON.stringify(state));await w.close();updateSyncBtn('ok');}catch(e){updateSyncBtn('error');}}
  function persistLocalOnly(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}catch(e){}}
  async function readAndMaybeLoad(force){if(!syncHandle)return;lastRead=Date.now();const ok=await ensurePerm(syncHandle);if(!ok){syncReady=false;updateSyncBtn('need');return;}
    syncReady=true;
    try{const f=await syncHandle.getFile();const text=await f.text();if(text){const data=JSON.parse(text);
      if(force||(data.savedAt||0)>(state.savedAt||0)){state=normalize(data);state.savedAt=data.savedAt||now();
        closePanel();selection.clear();selectedLink=null;selectedImage=null;selectedGroup=null;buildScene();persistLocalOnly();}}
      updateSyncBtn('ok');}catch(e){updateSyncBtn('error');}}
  async function linkNewFile(){if(!FSA){showBanner('此瀏覽器不支援連結同步檔，請用桌面版 Chrome 或 Edge。');return;}
    try{const h=await window.showSaveFilePicker({suggestedName:'whiteboard-sync.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});
      syncHandle=h;syncReady=true;state.savedAt=now();await writeSyncFile();await idbSet('syncHandle',h);updateSyncBtn('ok');
      showBanner('已建立同步檔「'+h.name+'」。請確認它存在你的雲端硬碟資料夾（iCloud／Drive／Dropbox）裡，再到其他電腦用「連結現有同步檔」。');}catch(e){}}
  async function linkExistingFile(){if(!FSA){showBanner('此瀏覽器不支援連結同步檔，請用桌面版 Chrome 或 Edge。');return;}
    try{const a=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});const h=a[0];
      syncHandle=h;syncReady=true;await idbSet('syncHandle',h);await readAndMaybeLoad(true);showBanner('已連結同步檔「'+h.name+'」，這台電腦已載入同步資料。');}catch(e){}}
  async function reconnectSync(){const okp=await ensurePerm(syncHandle);if(!okp){updateSyncBtn('need');return;}await readAndMaybeLoad(false);}
  async function syncNow(){if(!syncHandle)return;await readAndMaybeLoad(false);await writeSyncFile();}
  async function unlinkSync(){syncHandle=null;syncReady=false;await idbDel('syncHandle');updateSyncBtn('none');}
  $('btnSync').addEventListener('click',function(){const r=this.getBoundingClientRect();const items=[];
    if(!FSA){showMenu([{label:'此瀏覽器不支援，請用 Chrome／Edge'}],r.left,r.bottom+4,'跨裝置同步');return;}
    if(!syncHandle){items.push({icon:'＋',label:'建立新的同步檔',onClick:linkNewFile});items.push({icon:'⇄',label:'連結現有同步檔',onClick:linkExistingFile});showMenu(items,r.left,r.bottom+4,'設定同步（單人跨裝置）');}
    else{if(!syncReady)items.push({icon:'⟳',label:'重新連結並同步',onClick:reconnectSync});else items.push({icon:'⟳',label:'立即同步',onClick:syncNow});
      items.push({sep:true});items.push({icon:'✕',label:'解除連結',danger:true,onClick:unlinkSync});
      showMenu(items,r.left,r.bottom+4,'同步檔：'+(syncHandle.name||'已連結'));}});
  window.addEventListener('focus',()=>{if(syncReady&&Date.now()-lastRead>1500)readAndMaybeLoad(false);});
  (async function(){if(!FSA)return;const h=await idbGet('syncHandle');if(h){syncHandle=h;updateSyncBtn('need');
    try{if((await h.queryPermission({mode:'readwrite'}))==='granted'){await readAndMaybeLoad(false);}}catch(e){}}})();

  // ---------- init ----------
  buildCardbar();load();buildScene();
  if(!state.cards.length){state.view={x:40,y:40,zoom:1};applyView();}
  idleStatus();
})();
</script>
</body>
</html>
